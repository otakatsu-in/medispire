kind = "web"
previewPath = "/"
title = "MediSpire"
version = "1.0.0"
id = "artifacts/medispire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22490

[services.development]
run = "pnpm --filter @workspace/medispire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medispire", "run", "build" ]
publicDir = "artifacts/medispire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22490"
BASE_PATH = "/"
